<!DOCTYPE html>
<html>
<head>
    <title>Chat Prototype</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <div id="chat-page">
        <input type="text" id="username" placeholder="Ваше имя" />
        <input type="text" id="message" placeholder="Сообщение..." />
        <button onclick="sendMessage()">Отправить</button>
        <ul id="messageArea"></ul>
    </div>

    <script>
        var stompClient = null;

        function connect() {
            var socket = new SockJS('/ws-chat');
            stompClient = Stomp.over(socket);
            stompClient.connect({}, function (frame) {
                stompClient.subscribe('/topic/public', function (payload) {
                    onMessageReceived(JSON.parse(payload.body));
                });
            });
        }

        function sendMessage() {
            var content = document.getElementById('message').value;
            var sender = document.getElementById('username').value;
            if(content && stompClient) {
                var chatMessage = { sender: sender, content: content };
                stompClient.send("/app/chat.sendMessage", {}, JSON.stringify(chatMessage));
                document.getElementById('message').value = '';
            }
        }

        function onMessageReceived(msg) {
            var node = document.createElement("LI");
            node.appendChild(document.createTextNode(msg.sender + ": " + msg.content));
            document.getElementById("messageArea").appendChild(node);
        }

        connect();
    </script>
</body>
</html>
