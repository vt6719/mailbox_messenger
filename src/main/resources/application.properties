spring.application.name=messenger

# ============================================
# DATABASE CONFIGURATION
# ============================================

# --------------------------------------------
# SQLite (закомментировано)
# --------------------------------------------
# spring.datasource.url=jdbc:sqlite:./messenger.db
# spring.datasource.driver-class-name=org.sqlite.JDBC
# spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# --------------------------------------------
# PostgreSQL (текущая основная база данных)
# --------------------------------------------
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:messenger}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT CONFIGURATION
# ============================================
jwt.secret=${JWT_SECRET:bWFpbGJveG1lc3NlbmdlcnNlY3JldGtleWZvcmp3dHRva2VuZ2VuZXJhdGlvbjI1NmJpdHM=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# FILE UPLOAD CONFIGURATION
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=${UPLOAD_DIR:./uploads}

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=${SERVER_PORT:8080}

# ============================================
# LOGGING
# ============================================
logging.level.com.example.messenger=INFO
logging.level.org.springframework.security=WARN
